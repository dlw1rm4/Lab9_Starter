<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 9</title>

  <style>
    button {
      margin: 3px;
    }

    button:hover {
      cursor: pointer;
    }

    #first-num,
    #second-num {
      width: 60px;
    }

    output {
      border: 1px solid gray;
      display: block;
      height: 18px;
      margin-top: 5px;
      padding: 5px;
      width: 240px;
    }

    main {
      width: 800px;
    }

    #error-btns {
      column-gap: 5px;
      display: flex;
      flex-wrap: wrap;
      margin-top: 30px;
      row-gap: 5px;
    }

    #error-btns>* {
      padding: 8px 2px;
      width: 122px;
    }
  </style>
</head>

<body>
  <main>
    <form>
      <fieldset>
        <legend>Error Calculator</legend>
        <input name="first-num" id="first-num" />
        <select name="operator" id="operator">
          <option>+</option>
          <option>-</option>
          <option>*</option>
          <option>/</option>
        </select>
        <input name="second-num" id="second-num" />
        <button id="calculate">Calculate</button>
        <br />
        <output></output>
      </fieldset>
    </form>

    <section id="error-btns">
      <button>Console Log</button>
      <button>Console Error</button>
      <button>Console Count</button>
      <button>Console Warn</button>
      <button>Console Assert</button>
      <button>Console Clear</button>
      <button>Console Dir</button>
      <button>Console dirxml</button>
      <button>Console Group Start</button>
      <button>Console Group End</button>
      <button>Console Table</button>
      <button>Start Timer</button>
      <button>End Timer</button>
      <button>Console Trace</button>
      <button>Trigger a Global Error</button>
    </section>
  </main>

  <script>
    let form = document.querySelector('form');
    form.addEventListener('submit', e => {
      e.preventDefault();
      let output = document.querySelector('output');
      let firstNum = document.querySelector('#first-num').value;
      let secondNum = document.querySelector('#second-num').value;
      let operator = document.querySelector('#operator').value;
      output.innerHTML = eval(`${firstNum} ${operator} ${secondNum}`);
    });

    let errorBtns = Array.from(document.querySelectorAll('#error-btns > button'));

    // Start your code here
    errorBtns[0].addEventListener('click', () => {
      console.log('Console Log Demo');
    });

    errorBtns[1].addEventListener('click', () => {
      console.error('This is a console error message.');
    });

    errorBtns[2].addEventListener('click', () => {
      console.count('This is a console count');
    });

    errorBtns[3].addEventListener('click', () => {
      console.warn('This is a console warning message.');
    });

    errorBtns[4].addEventListener('click', () => {
      console.assert(false, 'This is a console assert message.');
    });

    errorBtns[5].addEventListener('click', () => {
      console.clear();
    });

    errorBtns[6].addEventListener('click', () => {
      console.dir(document.body);
    });

    errorBtns[7].addEventListener('click', () => {
      console.dirxml(document.body);
    });

    errorBtns[8].addEventListener('click', () => {
      console.group('Console Group Start');
    });

    errorBtns[9].addEventListener('click', () => {
      console.groupEnd();
    });

    errorBtns[10].addEventListener('click', () => {
      console.table([{ name: 'John', age: 30 }, { name: 'Jane', age: 25 }]);
    });

    errorBtns[11].addEventListener('click', () => {
      console.time('Timer');
    });

    errorBtns[12].addEventListener('click', () => {
      console.timeEnd('Timer');
    });

    errorBtns[13].addEventListener('click', () => {
      console.trace();
    });

    errorBtns[14].addEventListener('click', () => {
      try {
        const userId = -1;
        if (userId < 0) {
          throw new RangeError(`Invalid user ID: ${userId}`);
        }
      } catch (err) {
        console.error('Global error caught:', err);
        throw err;
      } finally {
        console.log('finally: runs before re-throw propogates up');
      }
    });

    form.addEventListener('submit', e => {
      e.preventDefault();

      try {
        let output = document.querySelector('output');
        let firstNum = document.querySelector('#first-num').value;
        let secondNum = document.querySelector('#second-num').value;
        let operator = document.querySelector('#operator').value;

        if (operator === '/' && Number(secondNum) === 0) {
          throw new RangeError('Division by zero is not allowed.');
        }

        let result = eval(`${firstNum} ${operator} ${secondNum}`);

        if (isNaN(result)) {
          throw new TypeError('Input must be valid numbers');
        }

        output.innerHTML = result;
        
      } catch (err) {
        console.error('Calculator error caught:', err);
        document.querySelector('output').innerHTML = `Error: ${err.message}`;
      } finally {
        console.log('finally: calculation attempt finished regardless of outcome');x
      }
    });
    // You may move this JS to another file if you wish
  </script>
</body>

</html>
